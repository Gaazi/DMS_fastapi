<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسٹاف ایڈوانس ٹیسٹ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; text-align: right; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; }
        .success { background-color: #2ecc71; color: white; }
        .warning { background-color: #e67e22; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>اسٹاف ایڈوانس ریکارڈ (ڈیٹا بیس سے)</h2>
        <table>
            <thead>
                <tr>
                    <th>آئی ڈی</th>
                    <th>نام اسٹاف</th>
                    <th>رقم</th>
                    <th>تاریخ</th>
                    <th>اسٹیٹس</th>
                </tr>
            </thead>
            <tbody>
                {% for adv in advances %}
                <tr>
                    <td>{{ adv.id }}</td>
                    <td>{{ adv.staff_name }}</td>
                    <td>{{ adv.amount }}</td>
                    <td>{{ adv.date }}</td>
                    <td>
                        {% if adv.is_adjusted %}
                        <span class="status-badge success">برابر ہو گیا</span>
                        {% else %}
                        <span class="status-badge warning">باقی ہے</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
        <a href="/">واپس ہوم پیج</a>
    </div>
</body>
</html>
