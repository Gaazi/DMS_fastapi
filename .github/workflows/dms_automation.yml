name: "DMS: Automated Testing & cPanel Deployment"

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  # ============================================================
  # JOB 1: ٹیسٹنگ
  # ============================================================
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run FastAPI Tests
      env:
        DATABASE_URL: "sqlite:///:memory:"
        SECRET_KEY: "test-secret-key-for-github-actions-only"
        ALGORITHM: "HS256"
        ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      run: |
        # اگر tests فولڈر موجود ہے تو pytest چلائیں
        if [ -d "tests" ]; then
          pytest tests/ -v --tb=short
        else
          echo "No tests directory found — skipping tests."
          python -c "from app.main import app; print('✅ App imports successfully!')"
        fi

  # ============================================================
  # JOB 2: cPanel پر Deployment
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: test  # صرف test پاس ہونے کے بعد deploy ہو
    if: github.ref == 'refs/heads/main' # صرف main branch پر

    steps:
    - uses: actions/checkout@v4

    - name: Deploy Files to cPanel via SSH
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.SERVER_IP }}
        REMOTE_USER: ${{ secrets.SERVER_USER }}
        REMOTE_PORT: ${{ secrets.SSH_PORT }}
        SOURCE: "."
        TARGET: "/home/esabaqco/demo.esabaq.com/"
        ARGS: "-avz --delete"
        # یہ فائلیں upload نہ ہوں (server پر پہلے سے موجود ہیں)
        EXCLUDE: >
          /venv/,
          /.git/,
          /__pycache__/,
          /*.pyc,
          .env,
          database.db,
          db.sqlite3,
          *.log,
          /media/,
          /staticfiles/,
          .htaccess,
          passenger_wsgi.py

    - name: Restart App & Run Migrations
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e
          TARGET_DIR="/home/esabaqco/demo.esabaq.com"
          VENV_PATH="/home/esabaqco/virtualenv/demo.esabaq.com/3.11/bin/activate"

          echo "=== Deployment Starting ==="
          cd $TARGET_DIR

          # 1. ورچوئل انوائرنمنٹ ایکٹیویٹ کریں
          source $VENV_PATH
          echo "✅ Virtualenv activated"

          # 2. نئی لائبریریز انسٹال کریں
          pip install -r requirements.txt --quiet
          echo "✅ Dependencies installed"

          # 3. ڈیٹا بیس مائیگریشنز (Alembic)
          echo "--- Checking env.py content on server ---"
          grep "app.core.database" alembic/env.py || echo "❌ env.py is still OLD!"
          
          alembic upgrade head && echo "✅ Migrations done"

          # 4. پرانا Uvicorn بند کریں اور نیا شروع کریں
          pkill -f "uvicorn app.main:app" || echo "No old process to kill"
          sleep 2
          nohup uvicorn app.main:app \
            --host 127.0.0.1 \
            --port 8001 \
            --workers 2 \
            >> /home/esabaqco/uvicorn.log 2>&1 &

          sleep 5

          # 5. چیک کریں کہ چل رہا ہے
          if pgrep -f "uvicorn app.main:app" > /dev/null; then
            echo "✅ Uvicorn is running!"
          else
            echo "❌ Uvicorn failed to start! Check logs."
            tail -20 /home/esabaqco/uvicorn.log
            exit 1
          fi

          echo "=== Deployment Completed Successfully! ==="