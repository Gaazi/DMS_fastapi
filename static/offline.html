<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title>آف لائن | DMS Premium</title>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/fontawesome.all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --emerald: #10b981;
            --dark: #020617;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--dark);
            color: white; font-family: 'Smart', 'Mehr', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; perspective: 1000px;
        }

        /* Animated Mesh Gradient */
        .mesh-bg {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, var(--dark) 100%);
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.1;
            animation: drift 25s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--primary); top: -250px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -200px; right: -50px; animation-delay: -7s; }

        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg) scale(1.0); }
            100% { transform: translateY(100px) rotate(90deg) scale(1.2); }
        }

        /* Glass Container */
        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3rem;
            padding: 3rem 2rem;
            width: 90%; max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
            transform: translateZ(0);
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(2deg); }
        }

        .icon-box {
            width: 100px; height: 100px; margin: 0 auto 2rem;
            position: relative;
        }
        .icon-ring {
            position: absolute; inset: 0; border: 2px solid rgba(239, 68, 68, 0.2);
            border-radius: 40%; animation: spin 10s infinite linear;
        }
        .icon {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #ef4444; font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 {
            font-size: 2.25rem; font-weight: 900; margin: 0 0 1rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #94a3b8; font-size: 1.1rem; line-height: 1.7; margin-bottom: 2.5rem; }

        .btn {
            position: relative; overflow: hidden;
            background: white; color: black;
            padding: 1rem 2.5rem; font-size: 1.1rem; font-weight: 800;
            border-radius: 1.25rem; border: none; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex; align-items: center; gap: 0.75rem;
        }
        .btn:hover {
            background: var(--primary); color: white;
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.5);
            transform: scale(1.05);
        }
        .btn:active { transform: scale(0.95); }

        /* Floating Particles */
        .particle {
            position: absolute; width: 4px; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="mesh-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="card">
        <div class="icon-box">
            <div class="icon-ring"></div>
            <div class="icon"><i class="fas fa-signal-perfect-slash"></i></div>
        </div>
        <h1>رابطہ منقطع</h1>
        <p>ایسا معلوم ہوتا ہے کہ آپ کا انٹرنیٹ کام نہیں کر رہا۔ براہ کرم اپنا کنکشن چیک کریں اور صفحہ دوبارہ لوڈ کریں۔</p>
        <button class="btn" onclick="window.location.reload()">
            <i class="fas fa-redo-alt"></i>
            دوبارہ کوشش کریں
        </button>
    </div>

    <script>
        // Simple particle generation
        for(let i=0; i<20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.opacity = Math.random();
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
