{% extends 'base.html' %}

{% block content %}
<div x-data="{ 
    present: 0, absent: 0, late: 0, excused: 0, searchQuery: '', showSessionModal: false,
    updateStats() {
        this.present = document.querySelectorAll('input[value=present]:checked').length;
        this.absent = document.querySelectorAll('input[value=absent]:checked').length;
        this.late = document.querySelectorAll('input[value=late]:checked').length;
        this.excused = document.querySelectorAll('input[value=excused]:checked').length;
    }
}" x-init="setTimeout(() => updateStats(), 300)" class="relative z-10 text-slate-200">
    
    <form method="post" id="attendanceForm" class="max-w-7xl mx-auto py-8 md:py-12">
        {{ csrf_token() }}

        <!-- Cinematic Header -->


        <!-- Stats Bar: Tactical Style (Single Row on Mobile) -->
        <div class="px-4 md:px-8 grid grid-cols-4 gap-2 md:gap-4 mb-8">
            <div class="bg-[#0a0a0f] border border-emerald-500/20 rounded-xl md:rounded-3xl p-2 md:p-6 flex flex-col items-center justify-center shadow-2xl relative group">
                <div class="absolute inset-0 bg-emerald-500/5 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl md:rounded-3xl"></div>
                <p class="text-xs md:text-sm text-emerald-500 md:tracking-widest mb-0.5 md:mb-1 text-center">حاضر</p>
                <h3 class="text-xl md:text-4xl text-white font-black" x-text="present">0</h3>
            </div>
            <div class="bg-[#0a0a0f] border border-rose-500/20 rounded-xl md:rounded-3xl p-2 md:p-6 flex flex-col items-center justify-center shadow-2xl relative group">
                <div class="absolute inset-0 bg-rose-500/5 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl md:rounded-3xl"></div>
                <p class="text-xs md:text-sm text-rose-500 md:tracking-widest mb-0.5 md:mb-1 text-center">غیر حاضر</p>
                <h3 class="text-xl md:text-4xl text-white font-black" x-text="absent">0</h3>
            </div>
            <div class="bg-[#0a0a0f] border border-amber-500/20 rounded-xl md:rounded-3xl p-2 md:p-6 flex flex-col items-center justify-center shadow-2xl relative group">
                <div class="absolute inset-0 bg-amber-500/5 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl md:rounded-3xl"></div>
                <p class="text-xs md:text-sm text-amber-500 md:tracking-widest mb-0.5 md:mb-1 text-center">تاخیر</p>
                <h3 class="text-xl md:text-4xl text-white font-black" x-text="late">0</h3>
            </div>
            <div class="bg-[#0a0a0f] border border-blue-500/20 rounded-xl md:rounded-3xl p-2 md:p-6 flex flex-col items-center justify-center shadow-2xl relative group">
                <div class="absolute inset-0 bg-blue-500/5 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl md:rounded-3xl"></div>
                <p class="text-xs md:text-sm text-blue-500 md:tracking-widest mb-0.5 md:mb-1 text-center">رخصت</p>
                <h3 class="text-xl md:text-4xl text-white font-black" x-text="excused">0</h3>
            </div>
        </div>

        <div class="px-4 md:px-8 mb-4">
            <!-- Mobile-First Responsive Filter Grid -->
            <div class="grid grid-cols-2 md:grid-cols-12 gap-2 bg-[#0a0a0f] border border-white/10 rounded-2xl p-2 shadow-2xl overflow-hidden focus-within:border-blue-500/50 transition-all">
                
                <!-- 1. Search Section (Full width on mobile grid row 1) -->
                <div class="col-span-2 md:col-span-4 flex items-center bg-white/5 md:bg-transparent rounded-xl md:rounded-none">
                    <div class="w-8 h-8 flex items-center justify-center text-slate-600">
                        <i class="fas fa-search text-[10px]"></i>
                    </div>
                    <input type="text" x-model="searchQuery" name="q" placeholder="تلاش..." 
                           class="flex-1 bg-transparent border-none outline-none text-white placeholder:text-slate-600 text-sm md:text-base py-2">
                    <div class="md:hidden w-[1px] h-4 bg-white/10"></div>
                </div>
                
                <!-- Vertical Divider (Desktop only) -->
                <div class="hidden md:block md:col-span-1 flex justify-center items-center">
                    <div class="w-[1px] h-4 bg-white/10"></div>
                </div>

                <!-- 2. Course Section -->
                <div class="col-span-1 md:col-span-3 flex items-center relative group bg-white/5 md:bg-transparent rounded-xl md:rounded-none">
                    <div class="w-8 h-8 flex items-center justify-center text-blue-500 group-hover:scale-110 transition-transform">
                        <i class="fas fa-layer-group text-[10px]"></i>
                    </div>
                    <select name="course_id" class="flex-1 bg-transparent border-none text-white text-xs md:text-sm focus:ring-0 cursor-pointer p-0 pr-6 appearance-none"
                            hx-get="." 
                            hx-target="#student-list-container" 
                            hx-trigger="change" 
                            hx-push-url="true" 
                            hx-include="[name='date'], [name='q'], [name='session_id']"
                            hx-sync="this:replace"
                            hx-indicator="#loading-indicator">
                        <option value="" class="bg-[#020617]" {% if not selected_course_id %}selected{% endif %}>تمام کورسز</option>
                        {% for prog in all_courses %}
                        <option value="{{ prog.id }}" class="bg-[#020617]" {% if prog.id|stringformat('s') == selected_course_id %}selected{% endif %}>{{ prog.title }}</option>
                        {% endfor %}
                    </select>
                    <div class="absolute right-1 top-1/2 -translate-y-1/2 pointer-events-none text-slate-600">
                        <i class="fas fa-chevron-down text-[8px]"></i>
                    </div>
                </div>

                <!-- 3. Session Section (with Plus button integrated) -->
                <div class="col-span-1 md:col-span-4 flex items-center relative group bg-white/5 md:bg-transparent rounded-xl md:rounded-none overflow-hidden">
                    <div class="w-8 h-8 flex items-center justify-center text-emerald-500 group-hover:scale-110 transition-transform">
                        <i class="fas fa-clock text-[10px]"></i>
                    </div>
                    <select name="session_id" class="flex-1 bg-transparent border-none text-white text-xs md:text-sm focus:ring-0 cursor-pointer p-0 pr-6 appearance-none"
                            hx-get="." 
                            hx-target="#student-list-container" 
                            hx-trigger="change" 
                            hx-push-url="true" 
                            hx-include="[name='date'], [name='q'], [name='course_id']"
                            hx-sync="this:replace"
                            hx-indicator="#loading-indicator">
                        <option value="" class="bg-[#020617]">گھنٹی (Period)</option>
                        {% for sess in sessions %}
                        <option value="{{ sess.id }}" class="bg-[#020617]" {% if sess.id|stringformat('s') == selected_session_id %}selected{% endif %}>
                            {{ sess.topic|truncatechars(20) or sess.date|date('%H:%M') }}
                        </option>
                        {% endfor %}
                    </select>
                    <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-600">
                        <i class="fas fa-chevron-down text-[8px]"></i>
                    </div>

                    <!-- Compact Quick Add Session Button -->
                    <button type="button" @click="showSessionModal = true" 
                            class="w-6 h-6 flex items-center justify-center bg-emerald-600/20 text-emerald-500 rounded-lg hover:bg-emerald-600/30 transition-all ml-1 mr-1">
                        <i class="fas fa-plus text-[8px]"></i>
                    </button>
                </div>
            </div>
            
            <!-- Hidden Loading Indicator -->
            <div id="loading-indicator" class="htmx-indicator absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-50 rounded-2xl">
                <i class="fas fa-circle-notch fa-spin text-blue-500"></i>
            </div>
        </div>
            
            <!-- Hidden Loading Indicator -->
            <div id="loading-indicator" class="htmx-indicator absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-50 rounded-xl">
                <i class="fas fa-circle-notch fa-spin text-blue-500"></i>
            </div>
        </div>

        <!-- Quick Actions (Single Row) -->
        <div class="px-1 md:px-8 flex flex-row gap-2 mb-8 overflow-x-auto scrollbar-hide py-1">
            <!-- Date Picker (Compact) -->
            <div dir="ltr" class="flex-1 bg-[#0a0a0f] border border-white/10 rounded-xl p-0.5 flex items-center justify-center shadow-2xl focus-within:border-emerald-500/50 transition-all origin-left relative pointer-events-auto">
                <div class="w-6 h-6 flex items-center justify-center text-emerald-500 pl-1">
                    <i class="fas fa-calendar-alt text-[10px]"></i>
                </div>
                <input type="date" name="date" value="{{ selected_date|date('%Y-%m-%d') }}"
                       class="bg-transparent border-none text-white text-[9px] md:text-xs w-full focus:ring-0 cursor-pointer p-0 text-center 
                              [&::-webkit-calendar-picker-indicator]:invert [&::-webkit-calendar-picker-indicator]:opacity-0 [&::-webkit-calendar-picker-indicator]:absolute [&::-webkit-calendar-picker-indicator]:inset-0 [&::-webkit-calendar-picker-indicator]:w-full [&::-webkit-calendar-picker-indicator]:h-full [&::-webkit-calendar-picker-indicator]:cursor-pointer"
                       onclick="this.showPicker()"
                       hx-get="." 
                       hx-target="#student-list-container" 
                       hx-push-url="true" 
                       hx-include="[name='course_id'], [name='q'], [name='session_id']"
                       hx-sync="this:replace"
                       hx-indicator="#loading-indicator">
            </div>

            <!-- Mark All Present -->
            <button type="button" @click="document.querySelectorAll('input[value=present]').forEach(r => {r.checked = true; r.dispatchEvent(new Event('change'))}); updateStats()" 
                    class="flex-1 px-2 py-1.5 bg-emerald-600/10 border border-emerald-600/30 text-emerald-500 rounded-lg text-sm hover:bg-emerald-600/20 transition-all truncate">
                سب حاضر
            </button>

            <!-- Mark All Absent -->
            <button type="button" @click="document.querySelectorAll('input[value=absent]').forEach(r => {r.checked = true; r.dispatchEvent(new Event('change'))}); updateStats()" 
                    class="flex-1 px-2 py-1.5 bg-rose-600/10 border border-rose-600/30 text-rose-500 rounded-lg text-sm hover:bg-rose-600/20 transition-all truncate">
                سب غیر حاضر
            </button>
            
            <!-- Save Attendance (Mobile Handy) -->
            <button type="submit" 
                    class="flex-1 px-2 py-1.5 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-500 transition-all truncate font-bold">
                حاضری محفوظ کریں
            </button>
        </div>

        <!-- Interactive Student List Container (True Edge-to-Edge on Mobile) -->
        <div id="student-list-container" class="-mx-4 md:mx-0 overflow-x-hidden"
             hx-on::after-settle="updateStats()">
            {% include 'dms/partials/student_attendance_table.html' %}
        </div>

    </form>

    <!-- Simple Session Modal -->
    <div x-show="showSessionModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div @click.away="showSessionModal = false" class="bg-[#0a0a0f] border border-white/10 rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <div class="flex items-center justify-between mb-6 border-b border-white/5 pb-4">
                <h3 class="text-xl font-bold text-white">
                    <span class="block">نیا سیشن (Period) بنائیں</span>
                    <span class="text-[10px] text-emerald-500 uppercase tracking-widest font-bold mt-1">برائے کورس: {{ selected_course.title|default("کورس منتخب کریں") }}</span>
                </h3>
                <button type="button" @click="showSessionModal = false" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-slate-400 hover:text-white transition-all">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form method="post">
                {{ csrf_token() }}
                <input type="hidden" name="action" value="add_session">
                <input type="hidden" name="course_id" value="{{ selected_course_id }}">
                <input type="hidden" name="date" value="{{ selected_date|date('%Y-%m-%d') }}">

                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="block text-xs text-slate-400 mb-1.5 uppercase">سبق کا عنوان / موضوع</label>
                        <div class="relative">
                            <input type="text" name="topic" required placeholder="مثلاً قرآن پاک، حدیث، فقہ..." 
                                   class="w-full bg-black/40 border border-white/10 rounded-xl px-10 py-3 text-white focus:border-emerald-500 outline-none">
                            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-emerald-500/30">
                                <i class="fas fa-book-open text-xs"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="block text-xs text-slate-400 mb-1.5 uppercase">آغاز کا وقت</label>
                            <div class="relative">
                                <input type="time" name="start_time" required
                                       class="w-full bg-black/40 border border-white/10 rounded-xl px-9 py-3 text-white focus:border-emerald-500 outline-none cursor-pointer
                                              [&::-webkit-calendar-picker-indicator]:invert [&::-webkit-calendar-picker-indicator]:opacity-0 [&::-webkit-calendar-picker-indicator]:absolute [&::-webkit-calendar-picker-indicator]:inset-0 [&::-webkit-calendar-picker-indicator]:w-full [&::-webkit-calendar-picker-indicator]:h-full [&::-webkit-calendar-picker-indicator]:cursor-pointer"
                                       onclick="this.showPicker()">
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-emerald-500/30">
                                    <i class="fas fa-clock text-[11px]"></i>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="block text-xs text-slate-400 mb-1.5 uppercase">اختتام کا وقت</label>
                            <div class="relative">
                                <input type="time" name="end_time" required
                                       class="w-full bg-black/40 border border-white/10 rounded-xl px-9 py-3 text-white focus:border-emerald-500 outline-none cursor-pointer
                                              [&::-webkit-calendar-picker-indicator]:invert [&::-webkit-calendar-picker-indicator]:opacity-0 [&::-webkit-calendar-picker-indicator]:absolute [&::-webkit-calendar-picker-indicator]:inset-0 [&::-webkit-calendar-picker-indicator]:w-full [&::-webkit-calendar-picker-indicator]:h-full [&::-webkit-calendar-picker-indicator]:cursor-pointer"
                                       onclick="this.showPicker()">
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-emerald-500/30">
                                    <i class="fas fa-hourglass-end text-[11px]"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold transition-all shadow-lg shadow-emerald-600/20">
                        سیشن شروع کریں
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>


<style>
    /* HTMX Loading State */
    .htmx-indicator {
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
    }
    .htmx-request .htmx-indicator {
        opacity: 1;
        pointer-events: all;
    }
    .htmx-request.htmx-indicator {
        opacity: 1;
        pointer-events: all;
    }

    /* Smooth Table Transitions */
    #student-list-container {
        transition: opacity 0.3s ease;
    }
    .htmx-request#student-list-container {
        opacity: 0.5;
    }

    /* Scrollbar Hide */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    /* Tactical Focus Effects */
    input:focus, select:focus {
        outline: none;
        box-shadow: none !important;
    }
</style>
{% endblock %}
