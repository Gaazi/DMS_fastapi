<div id="receipt-container" hx-swap-oob="true">
    <div id="receipt-modal-wrapper" 
        class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-xl p-4 animate-fade-in">
        
        <div x-data="{}"
            class="bg-[#0a0a0f] rounded-[1.5rem] max-w-[260px] mx-auto w-full overflow-hidden shadow-2xl border border-white/10 relative">

            <!-- Tactical Header: Ultra Compact -->
            <div class="px-4 py-4 bg-gradient-to-br from-emerald-600/20 to-teal-900/40 border-b border-white/5 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-16 h-16 bg-emerald-500/10 rounded-full blur-xl -z-10"></div>
                
                <!-- Absolute Top-Left ID -->
                <div class="absolute top-2 left-3 z-20 text-left">
                    <p class="text-[9px] font-mono text-white">{{ result.record_id|default("00") }}</p>
                </div>
                
                <div class="flex items-center gap-2 text-emerald-400 relative z-10 mt-2">
                    <div class="w-8 h-8 rounded-lg bg-rose-500/20 flex flex-shrink-0 items-center justify-center border border-rose-500/30">
                        <i class="fas fa-file-invoice text-[10px] shadow-[0_0_10px_#f43f5e] text-rose-400"></i>
                    </div>
                    <div>
                        <h2 class="text-base text-white leading-none mb-0.5">{{institution.name_in_urdu}}</h2>
                        <p class="text-sm tracking-[0.1em] opacity-60 text-rose-400">{{institution.name}}</p>
                    </div>
                </div>
            </div>

            <!-- Receipt Registry Body -->
            <div class="p-4 space-y-2 text-right" dir="rtl">
                
                {% if message %}
                <div class="bg-rose-500/5 border border-rose-500/20 p-2 rounded-xl text-center">
                    <p class="text-rose-400 text-[9px] leading-tight">{{ message }}</p>
                </div>
                {% endif %}

                <!-- Main Data Slab -->
                <div class="bg-white/[0.02] border border-white/5 rounded-xl p-3 space-y-2">
                    <div class="flex flex-col justify-between items-start w-full">
                        <div class="flex justify-between items-center w-full">
                            <span class="text-xs text-slate-500">خرچ کی رقم</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-xs text-rose-400 tabular-nums">{{ amount }}</span>
                                <span class="text-[8px] text-slate-500">{{ currency_label }}</span>
                            </div>
                        </div>
                        <p class="text-xs text-slate-400 italic mt-0.5 w-full text-right uppercase tracking-wider">{{ amount_words }}</p>
                    </div>
                </div>

                <!-- Meta Row -->
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-white/[0.02] border border-white/5 p-2 rounded-xl flex flex-col items-start justify-between">
                         <div class="flex items-center gap-1.5 mb-1">
                             <i class="fas fa-money-bill-wave text-[8px] text-slate-600 leading-none"></i>
                             <span class="text-xs text-slate-500">طریقہ / مد</span>
                         </div>
                         <span class="text-slate-400 text-xs">{{ result.method|default("نقد/ڈونیشن") }}</span>
                    </div>
                    <div class="bg-white/[0.02] border border-white/5 p-2 rounded-xl flex items-center justify-between">
                         <i class="fas fa-calendar-day text-[8px] text-slate-600 leading-none"></i>
                         <span class="text-slate-400 text-[9px]">{{ now("d/M/Y") }}</span>
                    </div>
                </div>
            </div>

            <!-- Footer: Slim Actions -->
            <div class="px-4 pb-4 flex items-center gap-2">
                <button onclick="shareReceipt()"
                    class="flex-[1.2] bg-gradient-to-r from-rose-600 to-pink-600 text-white py-2 rounded-lg hover:from-rose-500 hover:to-pink-500 transition-all shadow-[0_0_10px_rgba(225,29,72,0.3)] flex items-center justify-center gap-1.5 active:scale-95 group border border-rose-400/20">
                    <i class="fab fa-whatsapp text-sm filter drop-shadow-md group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="text-[8px] font-bold tracking-wider uppercase">Share</span>
                </button>
                
                <button onclick="window.print()"
                    class="flex-[1.2] bg-white/5 backdrop-blur-md text-slate-300 py-2 rounded-lg hover:bg-white/10 hover:text-white transition-all border border-white/10 flex items-center justify-center gap-1.5 active:scale-95 group">
                    <i class="fas fa-print text-[10px] group-hover:text-rose-400 transition-colors"></i>
                    <span class="text-[8px] font-medium tracking-wide">Print</span>
                </button>

                <button @click="document.getElementById('receipt-modal-wrapper').remove()"
                    class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-white/5 text-slate-500 rounded-lg hover:bg-rose-500/20 hover:text-rose-400 hover:border-rose-500/30 transition-all active:scale-90 border border-transparent">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>
            
            <script>
                function shareReceipt() {
                    const text = `*Maktab Expense Voucher*\n------------------\nVoucher #: {{ result.record_id|default('00') }}\nCategory: {{ result.method }}\nAmount: {{ amount }} ({{ amount_words }})\nDate: {{ now("d/M/Y") }}\nStatus: Approved\n------------------\nAuto-generated by DMS`;
                    
                    if (navigator.share) {
                        navigator.share({
                            title: 'Expense Voucher',
                            text: text
                        }).catch(console.error);
                    } else {
                        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
                    }
                }
            </script>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
    .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
</style>
