<!-- Student Dashboard Stats Partial -->
<section id="student-dashboard-stats" 
         class="grid grid-cols-4 gap-2 md:gap-4 mb-8" 
         hx-get="{{ url('students', institution.slug) }}" 
         hx-trigger="every 30s, studentCreated from:body, studentDeleted from:body" 
         hx-swap="outerHTML">
    <div class="glass-card rounded-xl p-3 md:p-6 text-center group hover:border-blue-500/30 transition-all border border-white/10">
        <p class="text-xs md:text-sm text-blue-400/80 mb-1">کل طلبہ</p>
        <h3 class="text-sm md:text-2xl text-white">{{ total_students }}</h3>
    </div>
    <div class="glass-card rounded-xl p-3 md:p-6 text-center group hover:border-emerald-500/30 transition-all border border-white/10">
        <p class="text-xs md:text-sm text-emerald-400/80 mb-1">فعال</p>
        <h3 class="text-sm md:text-2xl text-white">{{ active_students }}</h3>
    </div>
    <div class="glass-card rounded-xl p-3 md:p-6 text-center group hover:border-rose-500/30 transition-all border border-white/10">
        <p class="text-xs md:text-sm text-rose-400/80 mb-1">غیر فعال</p>
        <h3 class="text-sm md:text-2xl text-white">{{ inactive_students }}</h3>
    </div>
    <div class="glass-card rounded-xl p-3 md:p-6 text-center group hover:border-amber-500/30 transition-all border border-white/10">
        <p class="text-xs md:text-sm text-amber-400/80 mb-1">آج کا اضافہ</p>
        <h3 class="text-sm md:text-2xl text-white">{{ today_added }}</h3>
    </div>
</section>
