{% extends 'base.html' %}

{% block title %}{{ institution.name }} - عملہ مینجمنٹ{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-10" dir="rtl">
  <!-- Top Navigation -->
  <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div class="flex items-center gap-4">
      <a href="{{ url('dms_staff', institution.slug) }}" 
         class="p-2 rounded-full bg-white shadow-sm border hover:bg-gray-50 transition" title="واپس اسٹاف ہب">
        <i class="fas fa-arrow-right text-gray-600"></i>
      </a>
      <h1 class="text-3xl font-extrabold text-gray-900">عملہ ڈائریکٹری</h1>
    </div>

    <!-- Action Buttons -->
    <div class="flex items-center gap-3">
        <a href="{{ url('dms_staff_create', institution.slug) }}" 
           class="inline-flex items-center gap-2 px-6 py-3 bg-emerald-600 text-white rounded-2xl shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 transition transform hover:-translate-y-0.5">
            <i class="fas fa-plus"></i>
            نیا رکن شامل کریں
        </a>
    </div>
  </div>

  <!-- Table Container (Full Width) -->
  <div class="bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border border-gray-100">
    <div class="px-8 py-6 border-b bg-gray-50/50 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-address-book text-indigo-600"></i>
            </div>
            <div>
                <h3 class="font-bold text-gray-800 leading-none">ملازمین کی فہرست</h3>
                <span class="text-[10px] text-gray-400 font-sans uppercase">All Registered Personnel</span>
            </div>
        </div>
        
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <form method="get" class="relative flex-grow sm:flex-grow-0">
                <input type="text" name="q" value="{{ query|default('') }}" 
                       placeholder="نام یا فون نمبر سے تلاش..." 
                       class="w-full sm:w-64 pl-10 pr-4 py-2 text-sm rounded-xl border-gray-200 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </form>
            <div class="hidden sm:block h-8 w-px bg-gray-200 mx-2"></div>
            <span class="text-xs text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg whitespace-nowrap">
                کل {{ total_count }} ارکان
            </span>
        </div>
    </div>

    <div class="overflow-x-auto" 
         hx-get="{{ url('dms_staff', institution.slug) }}"
         hx-trigger="staffChanged from:body">
      {% include 'dms/partials/staff_table_partial.html' %}
    </div>
  </div>
</div>
{% endblock %}
