{% if fee.status == 'Paid' %}
<span class="px-3 py-1 bg-green-100 text-green-800 text-xs rounded-full uppercase">Paid</span>
{% elif fee.status == 'Partial' %}
<span class="px-3 py-1 bg-blue-100 text-blue-800 text-xs rounded-full uppercase">Partial</span>
{% elif fee.status == 'Overdue' %}
<span class="px-3 py-1 bg-red-100 text-red-800 text-xs rounded-full uppercase">Overdue</span>
{% else %}
<span class="px-3 py-1 bg-gray-100 text-gray-800 text-xs rounded-full uppercase">Pending</span>
{% endif %}
