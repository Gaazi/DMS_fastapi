{% for member in members %}
<tr x-show="!searchQuery || '{{ member.full_name|tojson|safe }}'.includes(searchQuery)" 
    x-data="{ status: '{% if member.current_status %}{{ member.current_status }}{% else %}present{% endif %}' }"
    :class="{'bg-emerald-50/20': status == 'present', 'bg-rose-50/20': status == 'absent'}"
    class="transition-colors">
    
    <td class="py-4 px-6">
        <p class="font-bold text-slate-800 dark:text-white text-sm">{{ member.full_name }}</p>
        <p class="text-[10px] text-slate-400 font-medium">{{ member.get_role_display }}</p>
    </td>

    <td class="py-4 px-2 text-center">
        <input type="radio" name="staff_{{ member.id }}_status" value="present" x-model="status" @change="updateStats()" class="accent-emerald-600">
    </td>
    <td class="py-4 px-2 text-center">
        <input type="radio" name="staff_{{ member.id }}_status" value="absent" x-model="status" @change="updateStats()" class="accent-rose-600">
    </td>
    <td class="py-4 px-2 text-center">
        <input type="radio" name="staff_{{ member.id }}_status" value="late" x-model="status" @change="updateStats()" class="accent-amber-500">
    </td>
    <td class="py-4 px-2 text-center">
        <input type="radio" name="staff_{{ member.id }}_status" value="excused" x-model="status" @change="updateStats()" class="accent-blue-600">
    </td>

    <td class="py-4 px-6">
        <input type="text" name="remarks_{{ member.id }}" value="{{ member.current_remarks|default('') }}"
               class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-4 py-2 text-xs focus:ring-2 focus:ring-indigo-500/20"
               placeholder="کوئی نوٹ لکھیں...">
    </td>
</tr>
{% endfor %}
