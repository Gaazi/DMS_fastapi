<div class="relative">
    <button @click="toggle('user')"
        class="relative w-10 h-10 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300 group focus:outline-none flex items-center justify-center">
        
        <!-- Avatar Text (Initials) -->
        <span class="text-base text-white group-hover:scale-110 transition-transform duration-300" x-text="avatarText"></span>
        
        <!-- Online/Status Dot -->
        <div class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-slate-900 rounded-full"></div>
    </button>

    <div x-show="userOpen" 
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2 scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
        x-transition:leave-end="opacity-0 translate-y-2 scale-95"
        class="absolute left-1/2 -translate-x-1/2 sm:translate-x-0 sm:left-auto sm:end-0 mt-3 w-[280px] sm:w-72 max-w-[calc(100vw-2rem)] bg-slate-900/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl shadow-black/50 z-50 overflow-hidden"
        @click.outside="userOpen=false" x-cloak>
        
        <!-- User Header -->
        <div class="p-5 bg-gradient-to-br from-indigo-600 to-violet-600 border-b border-white/10 relative overflow-hidden group">
            <!-- Decorative Background Pattern -->
            <div class="absolute inset-0 opacity-20">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/30 rounded-full blur-2xl group-hover:bg-white/40 transition-all duration-500"></div>
                <div class="absolute bottom-0 left-0 w-24 h-24 bg-indigo-400/30 rounded-full blur-2xl"></div>
            </div>

            <div class="relative z-10 flex items-start gap-4">
                <div class="h-12 w-12 rounded-2xl bg-white/20 backdrop-blur-md border border-white/20 text-white flex items-center justify-center text-lg font-bold shadow-2xl"
                    x-text="avatarText"></div>
                <div class="flex-1 min-w-0">
                    <p class="text-white text-base truncate" x-text="admin.name"></p>
                    <p class="text-xs text-indigo-100 font-sans mt-0.5 truncate opacity-90" x-text="admin.email"></p>
                    <span class="inline-flex mt-2.5 text-xs px-2.5 py-1 bg-black/20 border border-white/10 text-white rounded-lg backdrop-blur-sm shadow-sm"
                        x-text="admin.role"></span>
                </div>
            </div>
        </div>

        <!-- Menu Items -->
        <div class="p-2 space-y-1">
            <a href="{% if institution %}{{ url('institution_detail', institution.slug) }}{% else %}{{ url('dms') }}{% endif %}"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-all group">
                <div class="w-8 h-8 rounded-lg bg-white/5 text-slate-400 group-hover:bg-indigo-500/20 group-hover:text-indigo-400 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-cog text-xs"></i>
                </div>
                <span class="text-sm font-medium">ترتیبات</span>
            </a>

            <!-- Admin Tools Link -->
            <a href="{% if institution %}{{ url('institution_admin_tools', institution.slug) }}{% else %}{{ url('system_backup_manager') }}{% endif %}"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-all group">
                <div class="w-8 h-8 rounded-lg bg-white/5 text-slate-400 group-hover:bg-indigo-500/20 group-hover:text-indigo-400 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-screwdriver-wrench text-xs"></i>
                </div>
                <span class="text-sm font-medium">ٹولز</span>
            </a>

            <div class="border-t border-white/5 my-1 mx-2"></div>

            <a href="{{ url('dms_logout') }}"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-rose-500/10 hover:text-rose-400 transition-all group">
                <div class="w-8 h-8 rounded-lg bg-white/5 text-slate-400 group-hover:bg-rose-500/20 group-hover:text-rose-400 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
                </div>
                <span class="text-sm font-medium">خروج</span>
            </a>
        </div>
    </div>
</div>
