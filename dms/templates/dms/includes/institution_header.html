
<!-- Dynamic Institution Header (Letter Pad Style) -->
{% if institution %}
<div class="relative z-10 mt-0.5 mb-2 border-b border-slate-800 pb-1" x-data="{ loaded: false }" x-init="setTimeout(() => loaded = true, 50)">
    <header class="flex flex-row-reverse items-center justify-between gap-1 md:gap-12 w-full p-1"
            x-show="loaded" x-transition:enter="transition duration-1000 ease-out" x-transition:enter-start="opacity-0 translate-y-6">
        
        <!-- Logo (Left) -->
        <!-- Debug: User={{ request.user }} Staff={{ request.user.is_staff }} Super={{ request.user.is_superuser }} -->
        <!-- Logo (Left) -->
        <div class="shrink-0">
            {% if institution.logo %}
                <img src="{{ institution.logo.url }}" alt="Logo" class="w-14 h-14 md:w-32 md:h-32 object-contain rounded-lg bg-white/5 p-0.5 border border-white/10">
            {% else %}
                <div class="w-16 h-16 md:w-32 md:h-32 rounded-lg bg-white/5 flex items-center justify-center border border-white/10 text-white/20">
                    <i class="fas fa-mosque text-xl md:text-4xl"></i>
                </div>
            {% endif %}
        </div>

        <!-- Details (Right aligned text) -->
        <div class="flex-1 min-w-0 flex flex-col items-end w-full space-y-0 text-right">
            
            <!-- Main Name (H1) -->
            <h1 class="text-xl pb-0.5 md:text-4xl text-white w-full truncate text-right">
                {{ institution.name_in_urdu }}
            </h1>
            
            <!-- English Name (H2) -->
            <h2 class="text-xs md:text-2xl text-indigo-400 font-serif uppercase w-full truncate leading-tight mt-0.5 text-right" dir="ltr">
                {{ institution.name }}
            </h2>

            <!-- Address (P) -->
            <p class="text-[9px] md:text-lg text-white font-mono flex flex-wrap items-center justify-end gap-x-2 gap-y-1 mt-0.5 w-full" dir="ltr">
                {% if institution.address %}
                    <span class="truncate min-w-0 max-w-full text-right flex-1 min-w-[100px]"><i class="fas fa-map-marker-alt text-rose-500 mr-0.5"></i> {{ institution.address }}</span>
                {% endif %}
                
                {% if institution.phone %}
                    <span class="shrink-0 whitespace-nowrap"><i class="fas fa-phone text-white mr-0.5"></i> {{ institution.phone }}</span>
                {% endif %}
            </p>
        </div>

    </header>
</div>
{% endif %}
