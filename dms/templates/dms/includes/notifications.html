<div class="relative">
    <!-- Bell Button -->
    <button
        @click="toggle('notifications')"
        class="relative w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300 group focus:outline-none">

        <!-- Icon with shake animation on hover -->
        <i class="fa-regular fa-bell text-xl text-white/70 group-hover:text-white transition-colors group-hover:animate-shake"></i>

        <!-- Unread Badge -->
        <span x-show="unread > 0"
              x-transition:enter="transition ease-out duration-300"
              x-transition:enter-start="opacity-0 scale-0"
              x-transition:enter-end="opacity-100 scale-100"
              class="absolute top-0 end-0 flex items-center justify-center w-3.5 h-3.5 bg-rose-500 text-white text-[9px] font-bold rounded-full ring-2 ring-slate-900 shadow-lg">
            <span x-text="unread"></span>
        </span>
    </button>

    <!-- Dropdown -->
    <div x-show="notificationsOpen" x-transition.origin.top x-cloak @click.outside="notificationsOpen = false"
        class="absolute left-1/2 -translate-x-1/2 sm:translate-x-0 sm:left-auto sm:end-0 mt-3 w-[280px] sm:w-80 max-w-[calc(100vw-2rem)] bg-slate-900/95 backdrop-blur-xl text-slate-200 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.6)] border border-slate-700/80 z-50 overflow-hidden ring-1 ring-white/10">

        <!-- Header -->
        <div class="bg-slate-800/40 px-3 py-2.5 sm:px-4 sm:py-3 border-b border-slate-700/50 flex justify-between items-center backdrop-blur-md">
            <span class="font-bold text-xs sm:text-sm text-white flex items-center gap-1.5">
                <i class="fa-solid fa-bell text-indigo-400"></i>
                نوٹیفکیشنز
            </span>
            <span class="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 text-[9px] sm:text-[10px] px-2 py-0.5 rounded-full font-medium tracking-wider shadow-sm">
                نئی
            </span>
        </div>

        <!-- Body -->
        <div class="max-h-[280px] sm:max-h-[320px] overflow-y-auto scrollbar-thin scrollbar-thumb-slate-700 scrollbar-track-transparent">
            
            <!-- Empty State -->
            <template x-if="notifications.length === 0">
                <div class="py-6 px-4 text-center flex flex-col items-center justify-center">
                    <i class="fa-regular fa-folder-open text-2xl text-slate-600 mb-2"></i>
                    <span class="text-xs font-medium text-slate-400">کوئی نئی اطلاع نہیں</span>
                </div>
            </template>

            <!-- Notification Items -->
            <template x-for="note in notifications" :key="note.id">
                <button @click="openNotification(note)"
                    class="w-full text-start py-2.5 px-3 sm:px-4 hover:bg-slate-800/80 border-b border-slate-800/50 flex gap-2.5 transition-colors duration-200 group focus:outline-none focus:bg-slate-800/80 relative overflow-hidden">
                    
                    <!-- Premium Left Accent Line -->
                    <div class="absolute start-0 top-0 bottom-0 w-0.5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
                         :style="`background-color: ${note.color || '#818cf8'};`">
                    </div>

                    <!-- Minimal Icon (No Circle) -->
                    <div class="shrink-0 flex items-start justify-center pt-0.5 transition-transform duration-300 group-hover:scale-110"
                        :style="`color: ${note.color || '#818cf8'}; text-shadow: 0 0 12px ${note.color || '#818cf8'}50;`">
                        <i :class="note.icon || 'fa-solid fa-circle-info'" class="text-[13px] sm:text-sm"></i>
                    </div>
                    
                    <!-- Content -->
                    <div class="flex-1 flex flex-col justify-center gap-0.5">
                        <p class="font-semibold text-[13px] sm:text-[13px] text-slate-200 group-hover:text-white transition-colors leading-tight" x-text="note.title"></p>
                        <p class="text-[11px] sm:text-[11px] text-slate-400 leading-snug line-clamp-2" x-text="note.description"></p>
                    </div>
                </button>
            </template>
        </div>

        <!-- Footer -->
        <a :href="notificationsUrl"
            class="block bg-slate-800/90 text-center text-[11px] sm:text-xs font-semibold text-indigo-400 py-2 sm:py-2.5 hover:bg-slate-700 hover:text-indigo-300 transition-colors border-t border-slate-700/50">
            تمام نوٹیفکیشنز دیکھیں
        </a>
    </div>
</div>
