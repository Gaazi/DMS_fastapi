{% extends 'base.html' %}


{% block title %}{{ institution.name }} - ڈونر حذف کریں{% endblock %}

{% block content %}
<div class="relative w-full py-16 flex items-center justify-center min-h-screen" 
     x-data="{ loaded: false }" 
     x-init="setTimeout(() => loaded = true, 50)"
     dir="rtl">

    <div class="w-full max-w-lg px-4"
         x-show="loaded" x-transition:enter="transition duration-500 ease-out" x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100">
        
        <div class="bg-rose-900/10 border border-rose-500/20 backdrop-blur-xl rounded-3xl p-8 md:p-10 text-center relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-rose-500/20 rounded-full blur-3xl pointer-events-none"></div>

            <div class="w-16 h-16 bg-rose-500/10 rounded-full flex items-center justify-center mx-auto mb-6 text-rose-500 border border-rose-500/20 shadow-lg shadow-rose-900/20">
                <i class="fas fa-exclamation-triangle text-2xl animate-pulse"></i>
            </div>

            <h2 class="text-2xl md:text-3xl font-bold text-white mb-3">کیا آپ کو یقین ہے؟</h2>
            <p class="text-slate-300 text-sm md:text-base leading-relaxed mb-8">
                آپ <span class="text-rose-400 font-bold px-1 bg-rose-500/10 rounded">{{ donor.name }}</span> کو حذف کرنے جا رہے ہیں۔ یہ عمل ناقابل واپسی ہے اور اس ڈونر کا تمام ریکارڈ ختم ہو سکتا ہے۔
            </p>

            <form method="post" class="flex flex-col gap-3">
                {{ csrf_token() }}
                <button type="submit" 
                        class="w-full py-4 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-sm font-bold shadow-lg shadow-rose-900/40 transition-all hover:scale-[1.02] active:scale-[0.98]">
                    ہاں، حذف کر دیں
                </button>
                <a href="{{ url('donor', institution.slug) }}" 
                   class="w-full py-3.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl text-sm font-medium transition-colors border border-slate-700 hover:border-slate-600">
                    نہیں، واپس جائیں
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
